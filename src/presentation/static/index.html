<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clink - Local Media Downloader</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    },
                    colors: {
                        brand: {
                            500: '#6366f1',
                            600: '#4f46e5',
                        },
                        dark: {
                            900: '#0f172a',
                            800: '#1e293b',
                            700: '#334155',
                        }
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-dark-900 text-white min-h-screen flex flex-col font-sans relative overflow-hidden">
    <!-- Animated background effects -->
    <div class="absolute top-[-10%] left-[-10%] w-[40%] h-[40%] bg-brand-600/30 rounded-full blur-[120px] pointer-events-none"></div>
    <div class="absolute bottom-[-10%] right-[-10%] w-[40%] h-[40%] bg-purple-600/20 rounded-full blur-[120px] pointer-events-none"></div>

    <!-- Navigation -->
    <nav class="glass-header sticky top-0 z-50 border-b border-white/10 px-6 py-4 flex justify-between items-center">
        <div class="flex items-center gap-3">
            <div class="w-8 h-8 rounded-lg bg-gradient-to-tr from-brand-500 to-purple-500 flex items-center justify-center font-bold text-lg shadow-lg">C</div>
            <h1 class="text-xl font-bold tracking-tight">Clink<span class="text-white/50 font-normal">Downloader</span></h1>
        </div>
        <button id="openFolderBtn" class="flex items-center gap-2 text-sm font-medium px-4 py-2 rounded-lg bg-white/5 hover:bg-white/10 transition-colors border border-white/10">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 19a2 2 0 01-2-2V7a2 2 0 012-2h4l2 2h4a2 2 0 012 2v1M5 19h14a2 2 0 002-2v-5a2 2 0 00-2-2H9a2 2 0 00-2 2v5a2 2 0 01-2 2z"></path></svg>
            Open Downloads
        </button>
    </nav>

    <!-- Main Content -->
    <main class="flex-1 max-w-4xl w-full mx-auto px-6 py-12 flex flex-col gap-8 relative z-10">
        
        <!-- Input Section -->
        <section class="glass-card p-6 md:p-8 rounded-2xl border border-white/10 shadow-2xl flex flex-col gap-6 relative overflow-hidden group transition-all duration-500 hover:border-brand-500/30">
            <div class="absolute inset-0 bg-gradient-to-b from-white/5 to-transparent opacity-0 group-hover:opacity-100 transition-opacity duration-500 pointer-events-none"></div>
            
            <div>
                <h2 class="text-2xl font-bold mb-2">Download Media</h2>
                <p class="text-white/60 text-sm">Paste one or multiple URLs from Instagram, X, TikTok, YouTube, or Reddit. HD/4K quality guaranteed.</p>
            </div>

            <div class="relative">
                <textarea id="urlInput" class="w-full h-32 bg-dark-800/50 border border-white/10 rounded-xl p-4 text-sm focus:outline-none focus:ring-2 focus:ring-brand-500 focus:border-transparent resize-none transition-all placeholder:text-white/30" placeholder="https://youtube.com/watch?v=...&#10;https://x.com/user/status/..."></textarea>
                <div class="absolute bottom-4 right-4 text-xs text-white/40 font-medium">Auto-detecting clipboard...</div>
            </div>

            <div class="flex justify-end">
                <button id="downloadBtn" class="bg-brand-600 hover:bg-brand-500 text-white font-medium py-3 px-8 rounded-xl shadow-lg shadow-brand-500/25 transition-all transform hover:scale-[1.02] active:scale-[0.98] flex items-center gap-2">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path></svg>
                    Start Download
                </button>
            </div>
        </section>

        <!-- Queue Section -->
        <section class="flex flex-col gap-4">
            <div class="flex items-center justify-between px-2">
                <h3 class="text-lg font-semibold">Active Queue</h3>
                <span id="queueCount" class="text-xs font-medium bg-white/10 px-2 py-1 rounded-md">0 items</span>
            </div>
            
            <div id="queueList" class="flex flex-col gap-3">
                <!-- Items injected by JS -->
                <div id="emptyState" class="text-center py-12 border border-dashed border-white/10 rounded-xl bg-white/5">
                    <p class="text-white/40 text-sm">No active downloads</p>
                </div>
            </div>
        </section>

    </main>

    <script src="/static/app.js"></script>
</body>
</html>
